version: '3.8'

services:
  healthai-dashboard:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./data:/app/data # Persists the SQLite database across restarts
    restart: unless-stopped
